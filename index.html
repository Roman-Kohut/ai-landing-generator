<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Generátor landing stránok</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#000; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const VIBES = ["Odvážny & moderný", "Minimalistický & elegantný", "Vrelý & priateľský"];
const VIBE_HINTS = [
  "odvážny, moderný, výrazné sýte farby, veľký kontrast, sebavedomý tón",
  "minimalistický, elegantný, tlmené alebo pastelové farby, veľa bieleho priestoru, decentný tón",
  "vrelý, priateľský, teplé farby (oranžová/žltá/hnedá/terakota), útulný, ľudský tón",
];

const GROQ_MODEL = "openai/gpt-oss-120b";
const LS_KEY = "ai_landing_gen_groq_key";

function fallbackVariant(desc, vibeIndex) {
  const palettes = [
    { primary: "#4f46e5", accent: "#818cf8", bg: "#0f0f1a", text: "#f5f5ff", surface: "#1a1a2e", grad1: "#4f46e5", grad2: "#ec4899" },
    { primary: "#0f172a", accent: "#94a3b8", bg: "#fafaf9", text: "#18181b", surface: "#ffffff", grad1: "#0f172a", grad2: "#334155" },
    { primary: "#c2410c", accent: "#fb923c", bg: "#fffbeb", text: "#292524", surface: "#fff7ed", grad1: "#f59e0b", grad2: "#ef4444" },
  ];
  const name = desc.trim().split(/\s+/).slice(0, 5).join(" ") || "Tvoj biznis";
  return {
    vibe: VIBES[vibeIndex],
    colors: palettes[vibeIndex],
    hero: { title: name.charAt(0).toUpperCase() + name.slice(1), subtitle: desc.trim() || "Opíš svoj biznis a AI vytvorí stránku.", cta: "Kontaktujte nás" },
    features: [
      { icon: "✨", title: "Kvalita", text: "Dôraz na detail v každom kroku." },
      { icon: "🤝", title: "Osobný prístup", text: "Prispôsobíme sa presne vašim potrebám." },
      { icon: "⚡", title: "Rýchlosť", text: "Rýchla a spoľahlivá realizácia." },
    ],
    services: [
      { name: "Základ", price: "od 29 €", desc: "Ideálne na začiatok." },
      { name: "Štandard", price: "od 59 €", desc: "Najobľúbenejšia voľba." },
      { name: "Premium", price: "od 99 €", desc: "Kompletné riešenie na mieru." },
    ],
    testimonials: [
      { name: "Jana K.", role: "Spokojná zákazníčka", quote: "Skvelá skúsenosť, určite sa vrátim." },
      { name: "Peter M.", role: "Klient", quote: "Profesionálny prístup od začiatku do konca." },
    ],
    faq: [
      { q: "Ako prebieha objednávka?", a: "Kontaktujete nás cez formulár alebo telefonicky a dohodneme si detaily." },
      { q: "Aké sú platobné možnosti?", a: "Prijímame platbu kartou aj hotovosťou." },
    ],
    about: `Sme tím za projektom „${name}". Veríme v ${desc.trim() ? desc.trim().slice(0, 100) : "kvalitu a úprimný prístup"} a radi vám ukážeme, čo pre vás môžeme spraviť.`,
    contact: { email: "info@" + name.toLowerCase().replace(/[^a-z0-9]+/g, "") + ".sk", phone: "+421 900 000 000", address: "Trnava, Slovensko" },
    _fallback: true,
  };
}

function extractJson(rawText) {
  const cleaned = rawText.replace(/```json|```/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    const match = cleaned.match(/[\[{][\s\S]*[\]}]/);
    if (match) return JSON.parse(match[0]);
    throw e;
  }
}

async function callAI(apiKey, prompt, maxTokens = 2200) {
  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error("API chyba " + response.status + ": " + errText.slice(0, 200));
  }
  const json = await response.json();
  const text = json.choices && json.choices[0] && json.choices[0].message && json.choices[0].message.content;
  if (!text) throw new Error("Prázdna odpoveď od AI");
  return extractJson(text);
}

function buildVariantPrompt(desc, vibeIndex, seed) {
  return `Si expert na copywriting a web dizajn. Používateľ opísal biznis: "${desc}".

Vytvor JEDEN JSON objekt (a nič iné - žiadny úvodný text, žiadne markdown bloky, žiadne \`\`\`) pre landing page v tomto štýle: ${VIBE_HINTS[vibeIndex]}.

Buď maximálne konkrétny pre TENTO biznis - žiadne univerzálne frázy typu "Kvalita" alebo "Rýchlosť", vymysli obsah, ktorý dáva zmysel len pre "${desc}". Farby zvoľ ako konkrétne hex kódy vhodné pre daný biznis a štýl (nie generické). Náhodné číslo pre rozmanitosť (ignoruj jeho hodnotu, len sa ním inšpiruj aby si nebol vždy rovnaký): ${seed}.

Presný formát:
{
  "vibe": "krátky názov štýlu",
  "colors": { "primary": "#hex", "accent": "#hex", "bg": "#hex", "text": "#hex", "surface": "#hex", "grad1": "#hex", "grad2": "#hex" },
  "hero": { "title": "pútavý nadpis max 6 slov", "subtitle": "1-2 vety, lákavé", "cta": "text tlačidla 2-3 slová" },
  "features": [3x { "icon": "jedno emoji", "title": "krátky titulok", "text": "1 veta" }],
  "services": [3x { "name": "názov balíčka/služby", "price": "realistická cena v €", "desc": "1 veta" }],
  "testimonials": [2x { "name": "meno", "role": "kto je", "quote": "krátky citát" }],
  "faq": [3x { "q": "otázka", "a": "krátka odpoveď" }],
  "about": "2-3 vety o nás, prvá osoba množného čísla",
  "contact": { "email": "realisticky vyzerajúci email", "phone": "+421 9XX XXX XXX", "address": "mesto na Slovensku" }
}

Píš prirodzene po slovensky, žiadne lorem ipsum. Vráť IBA tento jeden JSON objekt.`;
}

function buildHtml(v) {
  const c = v.colors;
  return `<!DOCTYPE html>
<html lang="sk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${v.hero.title}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:${c.bg};color:${c.text};line-height:1.6}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
header{padding:7rem 2rem;text-align:center;background:linear-gradient(135deg,${c.grad1},${c.grad2});color:#fff}
header h1{font-size:clamp(2.2rem,5vw,3.8rem);margin-bottom:1rem}
header p{font-size:1.15rem;max-width:600px;margin:0 auto 2rem;opacity:.92}
.cta{display:inline-block;padding:1rem 2.2rem;background:#fff;color:${c.primary};border-radius:10px;text-decoration:none;font-weight:700}
section{padding:4.5rem 2rem;max-width:1100px;margin:0 auto}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.75rem}
.card{background:${c.surface};padding:2rem;border-radius:16px;border:1px solid rgba(0,0,0,.06)}
.card h3{color:${c.primary};margin-bottom:.5rem}
.price{font-size:1.6rem;font-weight:700;color:${c.primary};margin:.5rem 0}
.quote{font-style:italic;margin-bottom:.75rem}
.name{font-weight:700;color:${c.primary}}
.about{text-align:center;max-width:700px;margin:0 auto}
.about h2{color:${c.primary};margin-bottom:1rem}
.faq-item{border-bottom:1px solid rgba(0,0,0,.08);padding:1.2rem 0}
.faq-item h4{color:${c.primary};margin-bottom:.4rem}
footer{background:${c.primary};color:#fff;padding:3rem 2rem;text-align:center}
footer p{margin:.3rem 0;opacity:.9}
h2.section-title{text-align:center;color:${c.primary};margin-bottom:2rem;font-size:1.9rem}
</style></head><body>
<header><h1>${v.hero.title}</h1><p>${v.hero.subtitle}</p><a class="cta" href="#contact">${v.hero.cta}</a></header>
<section><h2 class="section-title">Prečo si vybrať nás</h2><div class="grid3">
${v.features.map((f) => `<div class="card"><div style="font-size:1.8rem">${f.icon}</div><h3>${f.title}</h3><p>${f.text}</p></div>`).join("")}
</div></section>
<section><h2 class="section-title">Služby</h2><div class="grid3">
${v.services.map((s) => `<div class="card"><h3>${s.name}</h3><div class="price">${s.price}</div><p>${s.desc}</p></div>`).join("")}
</div></section>
<section><h2 class="section-title">Čo hovoria zákazníci</h2><div class="grid3">
${v.testimonials.map((t) => `<div class="card"><p class="quote">"${t.quote}"</p><p class="name">${t.name}</p><p style="opacity:.7;font-size:.9rem">${t.role}</p></div>`).join("")}
</div></section>
<section class="about"><h2>O nás</h2><p>${v.about}</p></section>
<section><h2 class="section-title">Časté otázky</h2>
${v.faq.map((f) => `<div class="faq-item"><h4>${f.q}</h4><p>${f.a}</p></div>`).join("")}
</section>
<footer id="contact"><p style="font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700">${v.hero.title}</p>
<p>${v.contact.email}</p><p>${v.contact.phone}</p><p>${v.contact.address}</p></footer>
</body></html>`;
}

function Edit({ value, onChange, className, style, tag = "span" }) {
  const Tag = tag;
  return (
    <Tag
      contentEditable
      suppressContentEditableWarning
      onBlur={(e) => onChange(e.currentTarget.textContent)}
      className={className + " outline-none focus:ring-2 focus:ring-white/40 rounded px-0.5 cursor-text"}
      style={style}
    >
      {value}
    </Tag>
  );
}

function deepSet(obj, path, value) {
  if (path.length === 0) return value;
  const [key, ...rest] = path;
  if (Array.isArray(obj)) {
    const arr = obj.slice();
    arr[key] = deepSet(arr[key], rest, value);
    return arr;
  }
  return { ...obj, [key]: deepSet(obj[key], rest, value) };
}

function ApiKeyModal({ initialKey, onSave, onClose }) {
  const [key, setKey] = useState(initialKey || "");
  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
      <div className="bg-slate-900 border border-white/15 rounded-2xl p-6 max-w-md w-full">
        <h3 className="font-bold text-lg mb-2">Groq API kľúč</h3>
        <p className="text-sm text-white/60 mb-4">
          Táto stránka beží úplne bez servera — AI volania idú priamo z tvojho prehliadača.
          Potrebuješ vlastný bezplatný kľúč z{" "}
          <a href="https://console.groq.com/keys" target="_blank" rel="noreferrer" className="text-indigo-400 underline">
            console.groq.com/keys
          </a>. Kľúč sa ukladá iba lokálne v tomto prehliadači, nikam inam sa neposiela.
        </p>
        <input
          type="password"
          value={key}
          onChange={(e) => setKey(e.target.value)}
          placeholder="gsk_..."
          className="w-full rounded-lg border border-white/15 bg-black/30 p-3 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
        <div className="flex gap-2 justify-end">
          {initialKey && (
            <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm text-white/60 hover:bg-white/5">
              Zrušiť
            </button>
          )}
          <button
            onClick={() => key.trim() && onSave(key.trim())}
            disabled={!key.trim()}
            className="px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-sm font-semibold disabled:opacity-40"
          >
            Uložiť kľúč
          </button>
        </div>
      </div>
    </div>
  );
}

function SectionTool({ onClick, loading }) {
  return (
    <button
      onClick={onClick}
      disabled={loading}
      className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition bg-black/60 hover:bg-black/80 text-white text-[10px] px-2 py-1 rounded-full flex items-center gap-1 z-10"
    >
      {loading ? "⟳" : "↻"} {loading ? "..." : "Regenerovať"}
    </button>
  );
}

function LandingGenerator() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(LS_KEY) || "");
  const [showKeyModal, setShowKeyModal] = useState(false);
  const [desc, setDesc] = useState("");
  const [loading, setLoading] = useState(false);
  const [variants, setVariants] = useState(null);
  const [activeIdx, setActiveIdx] = useState(0);
  const [error, setError] = useState("");
  const [device, setDevice] = useState("desktop");
  const [editMode, setEditMode] = useState(false);
  const [copied, setCopied] = useState(false);
  const [openFaq, setOpenFaq] = useState(0);
  const [sectionLoading, setSectionLoading] = useState("");

  function saveKey(k) {
    localStorage.setItem(LS_KEY, k);
    setApiKey(k);
    setShowKeyModal(false);
  }

  async function generate() {
    if (!desc.trim()) return;
    if (!apiKey) {
      setShowKeyModal(true);
      return;
    }
    setLoading(true);
    setError("");
    setVariants(null);
    const seedBase = Math.floor(Math.random() * 1000000);

    const results = await Promise.allSettled(
      [0, 1, 2].map((i) => callAI(apiKey, buildVariantPrompt(desc, i, seedBase + i * 137)))
    );

    const arr = results.map((r, i) => {
      if (r.status === "fulfilled" && r.value && r.value.hero && r.value.colors) {
        return { ...r.value, vibe: r.value.vibe || VIBES[i] };
      }
      return fallbackVariant(desc, i);
    });

    const failedCount = results.filter((r) => r.status !== "fulfilled" || !r.value || !r.value.hero).length;
    setVariants(arr);
    setActiveIdx(0);
    if (failedCount > 0) {
      setError(
        failedCount === 3
          ? "AI generovanie zlyhalo pre všetky varianty (skontroluj API kľúč), zobrazujem záložné návrhy."
          : `${failedCount} z 3 variantov sa nepodarilo vygenerovať cez AI, doplnili sme ich záložným obsahom.`
      );
    }
    setLoading(false);
  }

  async function regenerateSection(key) {
    if (!variants) return;
    const v = variants[activeIdx];
    setSectionLoading(key);
    try {
      const shapeHint = {
        features: '[3x { "icon": "emoji", "title": "...", "text": "..." }]',
        services: '[3x { "name": "...", "price": "...", "desc": "..." }]',
        testimonials: '[2x { "name": "...", "role": "...", "quote": "..." }]',
        faq: '[3x { "q": "...", "a": "..." }]',
        hero: '{ "title": "...", "subtitle": "...", "cta": "..." }',
        about: '{ "about": "2-3 vety" }',
      }[key];
      const prompt = `Biznis: "${desc}". Štýl stránky: ${v.vibe}. Vygeneruj IBA nový obsah pre sekciu "${key}" v tomto JSON formáte (bez textu navyše, bez markdown): ${shapeHint}
Náhodné číslo pre rozmanitosť (ignoruj hodnotu): ${Math.floor(Math.random() * 1000000)}.
Po slovensky, prirodzené, konkrétne pre tento biznis.`;
      const result = await callAI(apiKey, prompt, 900);
      setVariants((prev) => {
        const updated = prev.slice();
        const current = updated[activeIdx];
        updated[activeIdx] =
          key === "about" ? { ...current, about: result.about || result } : { ...current, [key]: result };
        return updated;
      });
    } catch (e) {
      // silently ignore failed section regen
    } finally {
      setSectionLoading("");
    }
  }

  function updateField(path, value) {
    setVariants((prev) => {
      const updated = prev.slice();
      updated[activeIdx] = deepSet(updated[activeIdx], path, value);
      return updated;
    });
  }

  function copyCode() {
    navigator.clipboard.writeText(buildHtml(variants[activeIdx]));
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  }

  function download() {
    const blob = new Blob([buildHtml(variants[activeIdx])], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "landing-page.html";
    a.click();
    URL.revokeObjectURL(url);
  }

  const v = variants ? variants[activeIdx] : null;

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-950 to-black text-white">
      {showKeyModal && (
        <ApiKeyModal initialKey={apiKey} onSave={saveKey} onClose={() => setShowKeyModal(false)} />
      )}
      <div className="border-b border-white/10 backdrop-blur sticky top-0 z-20 bg-black/40">
        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-indigo-500/30 text-lg">
            🪄
          </div>
          <div className="flex-1">
            <h1 className="font-bold text-base leading-tight">AI Generátor landing stránok</h1>
            <p className="text-xs text-white/50">Opíš biznis → dostaneš 3 hotové verzie stránky</p>
          </div>
          <button
            onClick={() => setShowKeyModal(true)}
            className="text-xs px-3 py-1.5 rounded-lg border border-white/15 text-white/60 hover:bg-white/5"
          >
            {apiKey ? "🔑 Zmeniť kľúč" : "🔑 Nastaviť API kľúč"}
          </button>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-6 py-10">
        <div className="rounded-2xl border border-white/10 bg-white/5 backdrop-blur p-6 mb-8">
          <label className="block text-sm font-semibold text-white/80 mb-2">Opíš svoj biznis</label>
          <textarea
            value={desc}
            onChange={(e) => setDesc(e.target.value)}
            placeholder="Napr: kaviareň v Trnave, remeselná káva, chcem útulnú atmosféru..."
            className="w-full h-24 rounded-xl border border-white/15 bg-black/30 p-4 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"
          />
          <div className="flex items-center justify-between mt-4">
            <span className="text-xs text-white/40">{desc.length} znakov</span>
            <button
              onClick={generate}
              disabled={loading || !desc.trim()}
              className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-fuchsia-500 text-white text-sm font-semibold disabled:opacity-40 hover:brightness-110 transition shadow-lg shadow-indigo-500/20"
            >
              {loading ? "⟳" : "✨"}
              {loading ? "Generujem 3 verzie..." : "Vygenerovať 3 verzie"}
            </button>
          </div>
          {error && <p className="text-xs text-amber-400 mt-2">{error}</p>}
        </div>

        {variants && (
          <>
            <div className="grid grid-cols-3 gap-3 mb-6">
              {variants.map((vv, i) => (
                <button
                  key={i}
                  onClick={() => setActiveIdx(i)}
                  className={`rounded-xl p-4 text-left border transition ${activeIdx === i ? "border-white/60 bg-white/10" : "border-white/10 bg-white/[0.03] hover:bg-white/[0.06]"}`}
                >
                  <div className="flex gap-1.5 mb-2">
                    {[vv.colors.primary, vv.colors.grad1, vv.colors.grad2].map((c, j) => (
                      <div key={j} className="w-5 h-5 rounded-full border border-white/20" style={{ background: c }} />
                    ))}
                  </div>
                  <p className="text-xs font-semibold">{vv.vibe}</p>
                  <p className="text-[11px] text-white/40 mt-0.5 truncate">{vv.hero.title}</p>
                </button>
              ))}
            </div>

            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
              <div className="flex gap-1.5 bg-white/5 border border-white/10 rounded-lg p-1">
                <button onClick={() => setDevice("desktop")} className={`p-1.5 rounded text-sm ${device === "desktop" ? "bg-white/20" : ""}`}>💻</button>
                <button onClick={() => setDevice("mobile")} className={`p-1.5 rounded text-sm ${device === "mobile" ? "bg-white/20" : ""}`}>📱</button>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setEditMode(!editMode)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs font-medium transition ${editMode ? "border-indigo-400 bg-indigo-500/20 text-indigo-200" : "border-white/15 text-white/70 hover:bg-white/5"}`}>
                  ✏️ {editMode ? "Editácia zapnutá" : "Upraviť text"}
                </button>
                <button onClick={copyCode} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-white/15 text-xs font-medium text-white/70 hover:bg-white/5">
                  {copied ? "✓" : "📋"} {copied ? "Skopírované" : "Kopírovať kód"}
                </button>
                <button onClick={download} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white text-black text-xs font-semibold hover:bg-white/90">
                  ⬇ Stiahnuť HTML
                </button>
              </div>
            </div>

            {editMode && (
              <p className="text-[11px] text-indigo-300/80 mb-3">Klikni na ľubovoľný text na stránke a priamo ho preprac. Zmeny sa ukladajú automaticky.</p>
            )}

            <div className={`mx-auto transition-all ${device === "mobile" ? "max-w-sm" : "max-w-full"}`}>
              <div className="rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                <div className="bg-[#1a1a1a] px-4 py-2.5 flex gap-1.5">
                  <div className="w-2.5 h-2.5 rounded-full bg-red-500/70" />
                  <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/70" />
                  <div className="w-2.5 h-2.5 rounded-full bg-green-500/70" />
                </div>

                <div style={{ background: v.colors.bg, color: v.colors.text }}>
                  <div className="relative group px-8 py-20 text-center" style={{ background: `linear-gradient(135deg, ${v.colors.grad1}, ${v.colors.grad2})`, color: "#fff" }}>
                    <SectionTool loading={sectionLoading === "hero"} onClick={() => regenerateSection("hero")} />
                    {editMode ? (
                      <Edit tag="h2" value={v.hero.title} onChange={(val) => updateField(["hero", "title"], val)} className="text-4xl font-bold mb-3" style={{ fontFamily: "inherit" }} />
                    ) : (
                      <h2 className="text-4xl font-bold mb-3" style={{ fontFamily: "inherit" }}>{v.hero.title}</h2>
                    )}
                    <p className="max-w-lg mx-auto opacity-90 mb-6">
                      {editMode ? <Edit value={v.hero.subtitle} onChange={(val) => updateField(["hero", "subtitle"], val)} /> : v.hero.subtitle}
                    </p>
                    {editMode ? (
                      <Edit
                        tag="span"
                        value={v.hero.cta}
                        onChange={(val) => updateField(["hero", "cta"], val)}
                        className="inline-flex items-center gap-1.5 px-6 py-2.5 rounded-lg text-sm font-bold"
                        style={{ background: "#fff", color: v.colors.primary }}
                      />
                    ) : (
                      <span className="inline-flex items-center gap-1.5 px-6 py-2.5 rounded-lg text-sm font-bold" style={{ background: "#fff", color: v.colors.primary }}>
                        {v.hero.cta}
                      </span>
                    )}
                  </div>

                  <div className="relative group px-8 py-14 max-w-3xl mx-auto">
                    <SectionTool loading={sectionLoading === "features"} onClick={() => regenerateSection("features")} />
                    <h3 className="text-center font-bold text-xl mb-6" style={{ color: v.colors.primary }}>Prečo si vybrať nás</h3>
                    <div className="grid grid-cols-3 gap-4">
                      {v.features.map((f, i) => (
                        <div key={i} className="rounded-xl p-4" style={{ background: v.colors.surface, border: "1px solid rgba(0,0,0,.06)" }}>
                          {editMode ? (
                            <Edit tag="div" value={f.icon} onChange={(val) => updateField(["features", i, "icon"], val)} className="text-2xl mb-1.5" />
                          ) : (
                            <div className="text-2xl mb-1.5">{f.icon}</div>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={f.title} onChange={(val) => updateField(["features", i, "title"], val)} className="font-bold text-sm mb-1" style={{ color: v.colors.primary }} />
                          ) : (
                            <p className="font-bold text-sm mb-1" style={{ color: v.colors.primary }}>{f.title}</p>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={f.text} onChange={(val) => updateField(["features", i, "text"], val)} className="text-xs opacity-70" />
                          ) : (
                            <p className="text-xs opacity-70">{f.text}</p>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="relative group px-8 py-14 max-w-3xl mx-auto">
                    <SectionTool loading={sectionLoading === "services"} onClick={() => regenerateSection("services")} />
                    <h3 className="text-center font-bold text-xl mb-6" style={{ color: v.colors.primary }}>Služby</h3>
                    <div className="grid grid-cols-3 gap-4">
                      {v.services.map((s, i) => (
                        <div key={i} className="rounded-xl p-4 text-center" style={{ background: v.colors.surface, border: "1px solid rgba(0,0,0,.06)" }}>
                          {editMode ? (
                            <Edit tag="p" value={s.name} onChange={(val) => updateField(["services", i, "name"], val)} className="font-bold text-sm" />
                          ) : (
                            <p className="font-bold text-sm">{s.name}</p>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={s.price} onChange={(val) => updateField(["services", i, "price"], val)} className="text-lg font-bold my-1" style={{ color: v.colors.primary }} />
                          ) : (
                            <p className="text-lg font-bold my-1" style={{ color: v.colors.primary }}>{s.price}</p>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={s.desc} onChange={(val) => updateField(["services", i, "desc"], val)} className="text-xs opacity-70" />
                          ) : (
                            <p className="text-xs opacity-70">{s.desc}</p>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="relative group px-8 py-14 max-w-3xl mx-auto">
                    <SectionTool loading={sectionLoading === "testimonials"} onClick={() => regenerateSection("testimonials")} />
                    <h3 className="text-center font-bold text-xl mb-6" style={{ color: v.colors.primary }}>Čo hovoria zákazníci</h3>
                    <div className="grid grid-cols-2 gap-4">
                      {v.testimonials.map((t, i) => (
                        <div key={i} className="rounded-xl p-4" style={{ background: v.colors.surface, border: "1px solid rgba(0,0,0,.06)" }}>
                          <div className="flex gap-0.5 mb-1.5" style={{ color: v.colors.primary }}>{"★★★★★"}</div>
                          {editMode ? (
                            <Edit tag="p" value={t.quote} onChange={(val) => updateField(["testimonials", i, "quote"], val)} className="text-sm italic mb-2" />
                          ) : (
                            <p className="text-sm italic mb-2">"{t.quote}"</p>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={t.name} onChange={(val) => updateField(["testimonials", i, "name"], val)} className="text-xs font-bold" style={{ color: v.colors.primary }} />
                          ) : (
                            <p className="text-xs font-bold" style={{ color: v.colors.primary }}>{t.name}</p>
                          )}
                          {editMode ? (
                            <Edit tag="p" value={t.role} onChange={(val) => updateField(["testimonials", i, "role"], val)} className="text-[11px] opacity-60" />
                          ) : (
                            <p className="text-[11px] opacity-60">{t.role}</p>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="relative group px-8 py-14 max-w-lg mx-auto text-center">
                    <SectionTool loading={sectionLoading === "about"} onClick={() => regenerateSection("about")} />
                    <h3 className="font-bold text-xl mb-3" style={{ color: v.colors.primary }}>O nás</h3>
                    <p className="text-sm opacity-80">{editMode ? <Edit value={v.about} onChange={(val) => updateField(["about"], val)} /> : v.about}</p>
                  </div>

                  <div className="relative group px-8 py-14 max-w-2xl mx-auto">
                    <SectionTool loading={sectionLoading === "faq"} onClick={() => regenerateSection("faq")} />
                    <h3 className="text-center font-bold text-xl mb-4" style={{ color: v.colors.primary }}>Časté otázky</h3>
                    {v.faq.map((f, i) => (
                      <div key={i} className="border-b py-3" style={{ borderColor: "rgba(0,0,0,.08)" }}>
                        {editMode ? (
                          <Edit tag="p" value={f.q} onChange={(val) => updateField(["faq", i, "q"], val)} className="font-semibold text-sm" style={{ color: v.colors.primary }} />
                        ) : (
                          <button onClick={() => setOpenFaq(openFaq === i ? -1 : i)} className="w-full flex items-center justify-between text-left">
                            <span className="font-semibold text-sm" style={{ color: v.colors.primary }}>{f.q}</span>
                            <span className={`text-xs transition-transform ${openFaq === i ? "rotate-180" : ""}`}>▾</span>
                          </button>
                        )}
                        {(editMode || openFaq === i) && (
                          editMode ? (
                            <Edit tag="p" value={f.a} onChange={(val) => updateField(["faq", i, "a"], val)} className="text-xs opacity-70 mt-2" />
                          ) : (
                            <p className="text-xs opacity-70 mt-2">{f.a}</p>
                          )
                        )}
                      </div>
                    ))}
                  </div>

                  <div className="px-8 py-10 text-center text-white" style={{ background: v.colors.primary }}>
                    <p className="font-bold mb-1">{v.hero.title}</p>
                    {editMode ? (
                      <Edit tag="p" value={v.contact.email} onChange={(val) => updateField(["contact", "email"], val)} className="text-xs opacity-80" />
                    ) : (
                      <p className="text-xs opacity-80">{v.contact.email}</p>
                    )}
                    {editMode ? (
                      <Edit tag="p" value={v.contact.phone} onChange={(val) => updateField(["contact", "phone"], val)} className="text-xs opacity-80" />
                    ) : (
                      <p className="text-xs opacity-80">{v.contact.phone}</p>
                    )}
                    {editMode ? (
                      <Edit tag="p" value={v.contact.address} onChange={(val) => updateField(["contact", "address"], val)} className="text-xs opacity-80" />
                    ) : (
                      <p className="text-xs opacity-80">{v.contact.address}</p>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </>
        )}

        {!variants && !loading && (
          <div className="text-center py-20 text-white/30 text-sm">Napíš popis biznisu vyššie a klikni na „Vygenerovať 3 verzie"</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LandingGenerator />);
</script>
</body>
</html>
